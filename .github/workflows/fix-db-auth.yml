name: Fix DB Auth (one-shot)

on:
  workflow_dispatch:

jobs:
  fix:
    name: Find DB user and fix credentials
    runs-on: ubuntu-latest
    steps:
      - name: Fix via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SUMOPOD_HOST }}
          username: ${{ secrets.SUMOPOD_USER }}
          password: ${{ secrets.SUMOPOD_PASSWORD }}
          script: |
            cd /opt/mellyna-education
            OUT=/tmp/db-fix-$$.txt

            {
              echo "=== pg_hba.conf ACTUAL AUTH RULES ==="
              docker exec mellyna-education-postgres-1 cat /var/lib/postgresql/data/pg_hba.conf 2>&1 \
                | grep -v '^#' | grep -v '^$'

              echo "=== TRY psql as user mellyna ==="
              docker exec mellyna-education-postgres-1 psql -U mellyna -c "\du" 2>&1 || echo "mellyna: FAILED"

              echo "=== TRY psql as user mellyna_user ==="
              docker exec mellyna-education-postgres-1 psql -U mellyna_user -c "\du" 2>&1 || echo "mellyna_user: FAILED"

              echo "=== TRY psql default (no -U, reads PGUSER from env) ==="
              docker exec mellyna-education-postgres-1 psql -c "\du" 2>&1 || echo "default: FAILED"

              echo "=== TRY psql as user ubuntu ==="
              docker exec mellyna-education-postgres-1 psql -U ubuntu -c "\du" 2>&1 || echo "ubuntu: FAILED"

              echo "=== .env vars ==="
              grep -E "^(DATABASE_URL|POSTGRES_USER|POSTGRES_DB|POSTGRES_PASSWORD)" .env \
                | sed 's|postgresql://[^:]*:[^@]*@|postgresql://***:***@|' \
                | sed 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=***/'

            } > "$OUT" 2>&1
            echo "=== DIAG OUTPUT ==="
            cat "$OUT"
            echo "=== END DIAG ==="

            rm -f "$OUT"
