name: Fix DB Auth (one-shot)

on:
  workflow_dispatch:

jobs:
  fix:
    name: Fix DB credentials for mellyna user
    runs-on: ubuntu-latest
    steps:
      - name: Fix via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SUMOPOD_HOST }}
          username: ${{ secrets.SUMOPOD_USER }}
          password: ${{ secrets.SUMOPOD_PASSWORD }}
          script: |
            cd /opt/mellyna-education
            OUT=/tmp/db-fix-$$.txt

            PGPASS=$(grep "^POSTGRES_PASSWORD=" .env | cut -d= -f2 | tr -d '"')
            PGDB=$(grep "^POSTGRES_DB=" .env | cut -d= -f2 | tr -d '"')

            {
              echo "=== LIST USERS (mellyna connects to mellyna_db) ==="
              docker exec mellyna-education-postgres-1 psql -U mellyna mellyna_db -c "\du" 2>&1

              echo "=== RESET mellyna password to match .env POSTGRES_PASSWORD ==="
              docker exec mellyna-education-postgres-1 \
                psql -U mellyna mellyna_db -c "ALTER USER mellyna WITH PASSWORD '$PGPASS';" 2>&1

              echo "=== UPDATE .env to use mellyna as POSTGRES_USER ==="
              sed -i "s|^POSTGRES_USER=.*|POSTGRES_USER=mellyna|" .env
              sed -i "s|^DATABASE_URL=.*|DATABASE_URL=postgresql://mellyna:$PGPASS@postgres:5432/$PGDB|" .env
              echo "POSTGRES_USER now: $(grep "^POSTGRES_USER=" .env)"
              echo "DATABASE_URL now (masked): postgresql://mellyna:***@postgres:5432/$PGDB"

            } > "$OUT" 2>&1
            echo "=== FIX OUTPUT ==="
            cat "$OUT"
            echo "=== END FIX ==="

            echo "=== RESTART APP ==="
            docker compose -f docker-compose.prod.yml restart app
            sleep 25

            echo "=== APP STATUS ==="
            docker ps --format "table {{.Names}}\t{{.Status}}" | grep mellyna-education-app || echo "not found"

            echo "=== APP LOGS (last 20) ==="
            docker logs mellyna-education-app-1 --tail 20 2>&1 || echo "no logs"

            rm -f "$OUT"
