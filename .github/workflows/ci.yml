name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mellyna
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: mellyna_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://mellyna:secret@localhost:5432/mellyna_test

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Run tests
        run: npm test -- --passWithNoTests
        env:
          DATABASE_URL: postgresql://mellyna:secret@localhost:5432/mellyna_test
          NEXTAUTH_SECRET: ci-test-secret-32-chars-minimum-ok
          NEXTAUTH_URL: http://localhost:3000
          MIDTRANS_SERVER_KEY: dummy-key
          MIDTRANS_CLIENT_KEY: dummy-key
          MINIO_ENDPOINT: localhost
          MINIO_PORT: "9000"
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin123
          MINIO_BUCKET: mellyna-test
          N8N_WEBHOOK_SECRET: ci-test-n8n-secret
          WAHA_API_KEY: ci-test-waha-secret
