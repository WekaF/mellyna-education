name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Check Server State
    runs-on: ubuntu-latest

    steps:
      - name: SSH Diagnostics
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SUMOPOD_HOST }}
          username: ${{ secrets.SUMOPOD_USER }}
          password: ${{ secrets.SUMOPOD_PASSWORD }}
          script: |
            cd /opt/mellyna-education
            echo "=== DOCKER PS ==="
            docker ps --format "table {{.Names}}\t{{.Status}}" --filter "name=mellyna"
            echo ""
            echo "=== APP WHATDESKS_BASE_URL ==="
            docker exec mellyna-education-app-1 sh -c 'echo $WHATDESKS_BASE_URL' 2>/dev/null || echo "exec failed"
            echo ""
            echo "=== TEST LOGIN FROM APP CONTAINER ==="
            docker exec mellyna-education-app-1 sh -c 'wget -qO- --method=POST --header="Content-Type: application/json" --body-data="{\"email\":\"admin@whatapps.com\",\"password\":\"adminpassword\"}" http://whatdesks-backend:8080/auth/login 2>&1 | head -c 400' 2>/dev/null || echo "exec failed"
            echo ""
            echo "=== APP NETWORKS ==="
            docker inspect mellyna-education-app-1 --format "{{range $k, $v := .NetworkSettings.Networks}}{{$k}} {{end}}" 2>/dev/null
            echo ""
            echo "=== CADDY NETWORKS ==="
            docker inspect mellyna-education-caddy-1 --format "{{range $k, $v := .NetworkSettings.Networks}}{{$k}} {{end}}" 2>/dev/null
            echo ""
            echo "=== WHATDESKS NETWORK/PORTS ==="
            docker inspect whatdesks-backend --format "{{.NetworkSettings.Networks}}" 2>/dev/null | tr ',' '\n' | head -20
            docker port whatdesks-backend 2>/dev/null || echo "no host ports"
            docker port whatdesks-frontend 2>/dev/null || echo "no host ports"
            echo ""
            echo "=== HOST PORTS LISTENING ==="
            ss -tlnp | grep -E ':8000|:8005|:8080|:3001' || echo "(none)"
            echo ""
            echo "=== WHATDESKS CONTAINER IPS ==="
            docker inspect whatdesks-backend --format "{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}" 2>/dev/null
            docker inspect whatdesks-frontend --format "{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}" 2>/dev/null
            echo ""
            echo "=== MELLYNA CADDY NETWORKS ==="
            docker inspect mellyna-education-caddy-1 --format "{{range .NetworkSettings.Networks}}{{.NetworkID}}:{{.IPAddress}} {{end}}" 2>/dev/null
            echo ""
            echo "=== WHATDESKS NETWORKS ==="
            docker inspect whatdesks-backend --format "{{range .NetworkSettings.Networks}}{{.NetworkID}}:{{.IPAddress}} {{end}}" 2>/dev/null
            echo ""
            echo "=== WHATDESKS BACKEND LISTENING PORTS ==="
            docker exec whatdesks-backend ss -tlnp 2>/dev/null || docker exec whatdesks-backend netstat -tlnp 2>/dev/null || echo "cannot check"
            echo ""
            echo "=== TEST CURL WHATDESKS BACKEND (8080) ==="
            docker run --rm --network whatdesks_internal curlimages/curl:latest -s -o /dev/null -w "%{http_code}" http://whatdesks-backend:8080/auth/login -X POST -H "Content-Type: application/json" -d '{"email":"test","password":"test"}' --max-time 5 2>/dev/null || echo "curl failed"
            echo ""
            echo "=== TEST CURL WHATDESKS BACKEND (8000) ==="
            docker run --rm --network whatdesks_internal curlimages/curl:latest -s -o /dev/null -w "%{http_code}" http://whatdesks-backend:8000/auth/login -X POST -H "Content-Type: application/json" -d '{"email":"test","password":"test"}' --max-time 5 2>/dev/null || echo "curl failed"
            echo ""
            echo "=== TEST CURL WHATDESKS BACKEND (80) ==="
            docker run --rm --network whatdesks_internal curlimages/curl:latest -s -o /dev/null -w "%{http_code}" http://whatdesks-backend:80/auth/login -X POST -H "Content-Type: application/json" -d '{"email":"test","password":"test"}' --max-time 5 2>/dev/null || echo "curl failed"
