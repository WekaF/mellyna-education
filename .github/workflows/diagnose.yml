name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Check Server State
    runs-on: ubuntu-latest

    steps:
      - name: SSH Diagnostics
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SUMOPOD_HOST }}
          username: ${{ secrets.SUMOPOD_USER }}
          password: ${{ secrets.SUMOPOD_PASSWORD }}
          script: |
            cd /opt/mellyna-education
            echo "=== DOCKER PS ==="
            docker ps --format "table {{.Names}}\t{{.Status}}" 2>/dev/null | grep -E "mellyna"
            echo ""
            echo "=== DOCKER NETWORKS ==="
            docker network ls --format "{{.Name}}" 2>/dev/null | grep "mellyna"
            echo ""
            echo "=== ALL CONTAINERS ==="
            docker ps --format "  {{.Names}} | {{.Status}}" 2>/dev/null
            echo ""
            echo "=== DB AUTH TEST ==="
            PG_CONTAINER=$(docker ps --format "{{.Names}}" | grep -E "(mellyna|education).*postgres|postgres.*(mellyna|education)" | head -1)
            [ -z "$PG_CONTAINER" ] && PG_CONTAINER=$(docker ps --format "{{.Names}}" | grep -E "postgres" | head -1)
            echo "Postgres container: ${PG_CONTAINER:-NOT FOUND}"
            current_db_user=$(grep "^DATABASE_URL=" /opt/mellyna-education/.env 2>/dev/null | sed -E 's|.*://([^:@]+)[^@]*@.*|\1|')
            echo "DB user in .env: ${current_db_user:-<none>}"
            if [ -n "$PG_CONTAINER" ]; then
              docker exec "$PG_CONTAINER" psql -U "$current_db_user" -d postgres -c "SELECT 1" 2>&1 || echo "AUTH FAILED for user $current_db_user"
            fi
            echo ""
            echo "=== POSTGRES ROLES (which users can connect) ==="
            if [ -n "$PG_CONTAINER" ]; then
              for candidate in mellyna mellyna_user admin ubuntu app postgres; do
                result=$(docker exec "$PG_CONTAINER" psql -U "$candidate" -d postgres -c "SELECT 1" 2>&1)
                if echo "$result" | grep -q "1 row"; then
                  echo "WORKING: $candidate"
                else
                  echo "FAIL: $candidate — $(echo $result | head -c 80)"
                fi
              done
            fi
            echo ""
            echo "=== APP ENV VARS (Waguzz) ==="
            docker inspect mellyna-education-app-1 --format "{{range .Config.Env}}{{.}}\n{{end}}" 2>/dev/null | grep WAGUZZ
            echo ""
            echo "=== APP NETWORKS ==="
            docker inspect mellyna-education-app-1 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); nets=list(d[0]['NetworkSettings']['Networks'].keys()) if d else ['(container not running)']; print('\n'.join(nets))"
            echo ""
            echo "=== TEST CURL WAGUZZ (from app container) ==="
            WAGUZZ_URL=$(docker inspect mellyna-education-app-1 --format "{{range .Config.Env}}{{.}}\n{{end}}" 2>/dev/null | grep "^WAGUZZ_BASE_URL=" | cut -d= -f2)
            echo "Waguzz URL: $WAGUZZ_URL"
            if [ -z "$WAGUZZ_URL" ]; then
              echo "ERROR: WAGUZZ_BASE_URL not set in container — check server .env and docker-compose.prod.yml"
            else
              docker exec mellyna-education-app-1 wget -qO- --timeout=5 "$WAGUZZ_URL/health" 2>&1 | head -c 200 || echo "Waguzz health check failed or /health not available"
            fi
            echo ""
            echo "=== APP RECENT LOGS ==="
            docker logs mellyna-education-app-1 --tail 30 2>&1
            echo ""
            echo "=== CADDY RECENT LOGS ==="
            docker logs mellyna-education-caddy-1 --tail 10 2>&1
