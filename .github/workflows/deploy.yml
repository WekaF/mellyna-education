name: Deploy to Sumopod

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SUMOPOD_HOST }}
          username: ${{ secrets.SUMOPOD_USER }}
          password: ${{ secrets.SUMOPOD_PASSWORD }}
          capture_stdout: true
          script: |
            cd /opt/mellyna-education
            git rm --cached .env 2>/dev/null || true
            git pull origin main

            # Inject Waguzz env vars into server .env
            inject_env() {
              local key="$1" val="$2"
              local escaped_val
              escaped_val=$(printf '%s\n' "$val" | sed -e 's/[|&/\]/\\&/g')
              if grep -q "^${key}=" .env 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${escaped_val}|" .env
              else
                echo "${key}=${val}" >> .env
              fi
            }
            inject_env WAGUZZ_BASE_URL "${{ secrets.WAGUZZ_BASE_URL }}"
            inject_env WAGUZZ_API_KEY "${{ secrets.WAGUZZ_API_KEY }}"

            # Auto-repair DATABASE_URL if it uses wrong dev credentials
            if grep -qE "DATABASE_URL=.*weka|DATABASE_URL=.*localhost" .env 2>/dev/null; then
              echo "🔧 DATABASE_URL has dev credentials, auto-repairing..."
              # Use --user postgres to connect via unix socket (peer auth, no password required)
              real_user=$(docker exec --user postgres mellyna-education-postgres-1 psql -t -c "SELECT usename FROM pg_user WHERE usename != 'postgres' ORDER BY usename LIMIT 1" 2>/dev/null | tr -d ' \n')
              [ -z "$real_user" ] && real_user="postgres"
              real_db=$(docker exec --user postgres mellyna-education-postgres-1 psql -t -c "SELECT datname FROM pg_database WHERE datname NOT IN ('template0','template1','postgres') ORDER BY datname LIMIT 1" 2>/dev/null | tr -d ' \n')
              if [ -z "$real_db" ]; then
                real_db="mellyna_db"
                docker exec --user postgres mellyna-education-postgres-1 psql -c "CREATE DATABASE mellyna_db" 2>/dev/null || true
              fi
              new_pass="$(openssl rand -hex 16)"
              docker exec --user postgres mellyna-education-postgres-1 psql -c "ALTER USER \"$real_user\" WITH PASSWORD '$new_pass'" 2>/dev/null
              inject_env DATABASE_URL "postgresql://$real_user:$new_pass@postgres:5432/$real_db"
              inject_env POSTGRES_USER "$real_user"
              inject_env POSTGRES_PASSWORD "$new_pass"
              inject_env POSTGRES_DB "$real_db"
              echo "✅ DATABASE_URL fixed: user=$real_user db=$real_db"
            fi

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --remove-orphans --force-recreate app caddy
            docker exec mellyna-education-caddy-1 caddy reload --config /etc/caddy/Caddyfile || true
            docker image prune -f
            echo "✅ Mellyna Education deployed successfully"
