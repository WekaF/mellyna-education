name: Deploy to Sumopod

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SUMOPOD_HOST }}
          username: ${{ secrets.SUMOPOD_USER }}
          password: ${{ secrets.SUMOPOD_PASSWORD }}
          capture_stdout: true
          script: |
            cd /opt/mellyna-education
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate app
            docker image prune -f
            echo "✅ Mellyna Education deployed successfully"
            WAHA_KEY=$(grep "^WAHA_API_KEY=" /opt/mellyna-education/.env | cut -d= -f2- | tr -d '"' | tr -d "'" | tr -d '\r' | xargs)
            echo "WAHA_KEY length: ${#WAHA_KEY}"
            WA_RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "http://localhost:3001/api/sendText" \
              -H "Content-Type: application/json" \
              -H "X-Api-Key: $WAHA_KEY" \
              -d "{\"chatId\":\"${{ secrets.NOTIFY_WA_NUMBER }}@c.us\",\"text\":\"✅ *Deploy Sukses!*\n\nApp: mellyna-education\nCommit: ${{ github.sha }}\nBy: ${{ github.actor }}\n\nApp: https://mellyna-education.my.id\",\"session\":\"mellyna\"}" 2>&1 || true)
            echo "WA response: $WA_RESP"
