name: Deploy to Sumopod

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SUMOPOD_HOST }}
          username: ${{ secrets.SUMOPOD_USER }}
          password: ${{ secrets.SUMOPOD_PASSWORD }}
          capture_stdout: true
          script: |
            cd /opt/mellyna-education
            git rm --cached .env 2>/dev/null || true
            git pull origin main

            # Inject WhatDesks env vars into server .env
            inject_env() {
              local key="$1" val="$2"
              local escaped_val
              escaped_val=$(printf '%s\n' "$val" | sed -e 's/[|&/\]/\\&/g')
              if grep -q "^${key}=" .env 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${escaped_val}|" .env
              else
                echo "${key}=${val}" >> .env
              fi
            }
            inject_env WHATDESKS_EMAIL "${{ secrets.WHATDESKS_EMAIL }}"
            inject_env WHATDESKS_PASSWORD "${{ secrets.WHATDESKS_PASSWORD }}"
            inject_env WHATDESKS_DEVICE_ID "${{ secrets.WHATDESKS_DEVICE_ID }}"
            inject_env WHATDESKS_DEVICE_UUID "${{ secrets.WHATDESKS_DEVICE_UUID }}"

            # Find the actual postgres container name (may differ based on when stack was first started)
            PG_CONTAINER=$(docker ps --format "{{.Names}}" | grep -E "(mellyna|education).*postgres|postgres.*(mellyna|education)" | head -1)
            [ -z "$PG_CONTAINER" ] && PG_CONTAINER=$(docker ps --format "{{.Names}}" | grep -E "postgres" | head -1)
            echo "🔍 Postgres container: ${PG_CONTAINER:-NOT FOUND}"
            echo "🔍 All running containers:"
            docker ps --format "  {{.Names}} ({{.Status}})" | head -20

            # Test if current DATABASE_URL credentials actually work; repair if broken
            # Local unix socket connections use 'trust' auth in postgres docker image
            current_db_user=$(grep "^DATABASE_URL=" .env 2>/dev/null | sed -E 's|.*://([^:@]+)[^@]*@.*|\1|')
            echo "🔍 Current DB user: ${current_db_user:-<none>}"
            # psql defaults to DB name = username; must specify -d postgres explicitly
            db_ok=0
            if [ -n "$PG_CONTAINER" ] && [ -n "$current_db_user" ]; then
              if docker exec "$PG_CONTAINER" psql -U "$current_db_user" -d postgres -c "SELECT 1" >/dev/null 2>&1; then
                db_ok=1
              fi
            fi
            if [ "$db_ok" = "0" ]; then
              echo "🔧 DB auth failed (container=$PG_CONTAINER user=$current_db_user), repairing..."
              if [ -z "$PG_CONTAINER" ]; then
                echo "❌ Postgres container not found — cannot repair"
                exit 1
              fi
              # Try known candidates — mellyna is the original POSTGRES_USER from initialization
              real_user=""
              for candidate in mellyna mellyna_user admin ubuntu app postgres; do
                if docker exec "$PG_CONTAINER" psql -U "$candidate" -d postgres -c "SELECT 1" >/dev/null 2>&1; then
                  real_user="$candidate"
                  echo "✅ Found working DB user: $candidate"
                  break
                fi
              done
              if [ -z "$real_user" ]; then
                echo "❌ Cannot find working postgres superuser — trying verbose test..."
                docker exec "$PG_CONTAINER" psql -U mellyna -d postgres -c "SELECT 1" 2>&1 | head -5
                exit 1
              fi
              real_db=$(docker exec "$PG_CONTAINER" psql -U "$real_user" -d postgres -t -c \
                "SELECT datname FROM pg_database WHERE datname NOT IN ('template0','template1','postgres') ORDER BY datname LIMIT 1" \
                2>/dev/null | tr -d ' \n')
              if [ -z "$real_db" ]; then
                real_db="mellyna_db"
                docker exec "$PG_CONTAINER" psql -U "$real_user" -d postgres -c "CREATE DATABASE mellyna_db" 2>/dev/null || true
              fi
              new_pass="$(openssl rand -hex 16)"
              docker exec "$PG_CONTAINER" psql -U "$real_user" -d postgres -c "ALTER USER \"$real_user\" WITH PASSWORD '$new_pass'"
              inject_env DATABASE_URL "postgresql://$real_user:$new_pass@postgres:5432/$real_db"
              inject_env POSTGRES_USER "$real_user"
              inject_env POSTGRES_PASSWORD "$new_pass"
              inject_env POSTGRES_DB "$real_db"
              echo "✅ DATABASE_URL fixed: user=$real_user db=$real_db"
            else
              echo "✅ DB credentials OK"
            fi

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --remove-orphans --force-recreate app caddy
            docker exec mellyna-education-caddy-1 caddy reload --config /etc/caddy/Caddyfile || true
            docker image prune -f
            echo "✅ Mellyna Education deployed successfully"
