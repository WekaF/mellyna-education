name: Deploy to Sumopod

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            WHATDESKS_BASE_URL=http://whatdesks-backend:8080
            WHATDESKS_EMAIL=${{ secrets.WHATDESKS_EMAIL }}
            WHATDESKS_PASSWORD=${{ secrets.WHATDESKS_PASSWORD }}
            WHATDESKS_DEVICE_ID=${{ secrets.WHATDESKS_DEVICE_ID }}
            WHATDESKS_DEVICE_UUID=${{ secrets.WHATDESKS_DEVICE_UUID }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SUMOPOD_HOST }}
          username: ${{ secrets.SUMOPOD_USER }}
          password: ${{ secrets.SUMOPOD_PASSWORD }}
          capture_stdout: true
          script: |
            cd /opt/mellyna-education
            git rm --cached .env 2>/dev/null || true
            git pull origin main

            # Inject WhatDesks env vars into server .env
            inject_env() {
              local key="$1" val="$2"
              if grep -q "^${key}=" .env 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                echo "${key}=${val}" >> .env
              fi
            }
            inject_env WHATDESKS_BASE_URL "http://whatdesks-backend:8080"
            inject_env WHATDESKS_EMAIL "${{ secrets.WHATDESKS_EMAIL }}"
            inject_env WHATDESKS_PASSWORD "${{ secrets.WHATDESKS_PASSWORD }}"
            inject_env WHATDESKS_DEVICE_ID "${{ secrets.WHATDESKS_DEVICE_ID }}"
            inject_env WHATDESKS_DEVICE_UUID "${{ secrets.WHATDESKS_DEVICE_UUID }}"

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --remove-orphans --force-recreate app caddy
            docker exec mellyna-education-caddy-1 caddy reload --config /etc/caddy/Caddyfile || true
            docker image prune -f
            echo "✅ Mellyna Education deployed successfully"
