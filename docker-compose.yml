version: '3.8'

# Mellyna Education — Local Development Stack
# Jalankan: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mellyna
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mellyna_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mellyna -d mellyna_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9091:9001"  # MinIO Console UI
    volumes:
      - minio_data:/data

  waha:
    # WAHA = WhatsApp HTTP API (https://waha.devlike.pro/)
    image: devlikeapro/waha
    restart: unless-stopped
    environment:
      WHATSAPP_API_KEY: "mellyna-waha-secret"
      WHATSAPP_HOOK_URL: "http://host.docker.internal:3000/api/webhooks/waha"
      WHATSAPP_HOOK_EVENTS: "session.status"
      WAHA_DASHBOARD_USERNAME: "admin"
      WAHA_DASHBOARD_PASSWORD: "mellyna-waha-secret"
      WHATSAPP_HOOK_CUSTOM_HEADERS: "X-Api-Key:mellyna-waha-secret"
    ports:
      - "3001:3000"
    volumes:
      - waha_data:/tmp/waha-sessions
    extra_hosts:
      - "host.docker.internal:host-gateway"

  n8n:
    image: n8nio/n8n
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=adminpassword
      - WEBHOOK_URL=http://localhost:5678/
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  minio_data:
  waha_data:
  n8n_data:
